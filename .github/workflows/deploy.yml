name: CI / CD — Interview Lens

on:
  push:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Run the test suite on GitHub's runner
  # ──────────────────────────────────────────────
  test:
    name: Test (Django)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: ""
      REDIS_URL: ""
      AUTH0_DOMAIN: "test.auth0.com"
      AUTH0_API_AUDIENCE: "https://test-audience"
      AUTH0_ISSUER: "https://test.auth0.com/"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test --verbosity=2

  # ──────────────────────────────────────────────
  # Job 2: Deploy to EC2 — only if tests passed
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/Interview-Lens/backend

            git pull origin main

            source .venv/bin/activate
            pip install -r requirements.txt --quiet

            python manage.py migrate --noinput

            python manage.py collectstatic --noinput --clear

            sudo systemctl restart gunicorn
            sudo systemctl restart celery

            echo "Deploy complete."
